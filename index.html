<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#17140f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="幻想单机" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>自由幻想单机 P3.0 M4 刺客纵切</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="assets/pwa/app-icon-192.png" />
    <link rel="icon" href="assets/pwa/app-icon-192.png" />
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div id="app">
      <main class="boot-screen">
        <section class="boot-card">
          <span>自由幻想单机</span>
          <h1>正在进入 P3.0 M4</h1>
          <p>首次打开或版本更新时会下载本地资料与美术素材。</p>
          <div class="boot-bar"><i style="width:18%"></i></div>
          <em>准备启动...</em>
        </section>
      </main>
    </div>
    <script>
      (async () => {
        const params = new URLSearchParams(location.search);
        const reset = params.has("reset");
        if (reset && "serviceWorker" in navigator) {
          await Promise.all([
            navigator.serviceWorker.getRegistrations().then((regs) => Promise.all(regs.map((reg) => reg.unregister()))),
            "caches" in window ? caches.keys().then((keys) => Promise.all(keys.map((key) => caches.delete(key)))) : Promise.resolve()
          ]).catch(() => {});
        }
        await import(`./src/app.js?v=${reset ? Date.now() : "p30-m4-03"}`);
        if ("serviceWorker" in navigator) {
          window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
        }
      })();
    </script>
  </body>
</html>
